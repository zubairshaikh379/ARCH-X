name: data-visualization
description: "data visualization scaffold (dashboards, analysis reports, dataset explorers) with chart/table defaults"
kind: data-app
priority: 10

access:
  type: all_of
  conditions:
    - type: any_of
      conditions:
        - type: stack
          name: PNPM_WORKSPACE
        - type: dot_replit_version
          version: "2.0.0"
    - type: not
      condition:
        type: deployment_target
        name: databricks_app
    - type: not
      condition:
        type: stack
        name: DATABRICKS_APP

service_configs:
  - name: web
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev
    production:
      serve: static
      build:
        - pnpm
        - --filter
        - "@workspace/__SLUG__"
        - run
        - build
      publicDir: artifacts/__SLUG__/dist/public
      rewrites:
        - from: "/*"
          to: /index.html

initial_open_files:
  - src/main.tsx
  - src/App.tsx
  - src/index.css
  - /lib/api-spec/openapi.yaml
  - /lib/db/src/index.ts
  - /lib/db/src/schema/index.ts
  - /artifacts/api-server/src/index.ts
  - /artifacts/api-server/package.json

additional_skills:
  - database
