name: slides
description: "presentation slide deck scaffold"
kind: slides

access:
  type: stack
  name: PNPM_WORKSPACE

service_configs:
  - name: web
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev
    production:
      serve: static
      build:
        - pnpm
        - --filter
        - '@workspace/__SLUG__'
        - run
        - build
      publicDir: artifacts/__SLUG__/dist/public
      rewrites:
        - from: "/*"
          to: /index.html

initial_open_files:
  - index.html
  - src/slideLoader.ts
  - src/data/slides-manifest.json
  - src/index.css

additional_skills:
  - media-generation
