name: mockup-sandbox
description: "isolated mockup sandbox for rapid UI prototyping on the canvas"
kind: design

# Databricks Apps are web-app only — exclude the design/mockup artifact so the
# only artifact type advertised on a DATABRICKS_APP repl is react-vite.
access:
  type: not
  condition:
    type: stack
    name: DATABRICKS_APP

service_configs:
  - name: "Component Preview Server"
    development:
      run: npm run dev

initial_open_files: []
