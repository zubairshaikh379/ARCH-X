name: design-system
description: "Design system: tokens (DTCG), a shadcn component library themed from them, and a living style guide preview"
# A design system is a reusable token + component library with a style-guide
# preview. It is consumed by other artifacts rather than deployed on its own,
# so the design-system kind is non-publishable: the service config defines a
# development run command for the webview preview but no production build, so
# it is never selected for deployment.
kind: design-system

access:
  type: flag
  name: gate_design_system_creation
  variation: "true"

service_configs:
  - name: web
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev

initial_open_files:
  - SKILL.md
  - tokens.json
  - src/index.css
  - src/App.tsx
